spring.application.name=FDPACB
server.port=8080

# ─── H2 File-Based Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/fdpacb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── H2 Console (dev convenience) ────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Base64-encoded 256-bit secret key (change for production!)
app.jwt.secret=ZmRwYWNiLXN1cGVyLXNlY3JldC1rZXktZnItand0LXNpZ25pbmctMjAyNA==
app.jwt.expiration-ms=86400000

# ─── SpringDoc / Swagger ──────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
